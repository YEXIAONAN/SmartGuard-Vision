services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: smartguard-backend
    environment:
      DATABASE_URL: sqlite:///./data/smartguard_vision.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - smartguard-db:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: smartguard-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  smartguard-db:
